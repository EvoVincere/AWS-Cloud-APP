name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd portoLandingpage
            git pull
            docker stop porto-app || true
            docker rm porto-app || true
            docker build -t porto-app .
            docker run -d -p 80:80 --name porto-app porto-app
